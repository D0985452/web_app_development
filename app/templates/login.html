{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-2">會員登入</h2>
                <p class="text-muted" style="color: #94a3b8 !important;">歡迎回來！請輸入您的帳號密碼</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-4">
                    <label for="username" class="form-label ms-1" style="color: #cbd5e1;">帳號名稱</label>
                    <input type="text" class="form-control form-control-lg px-3" id="username" name="username" required placeholder="User">
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label ms-1" style="color: #cbd5e1;">密碼</label>
                    <input type="password" class="form-control form-control-lg px-3" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-4 py-3">進入系統</button>
            </form>
            
            <div class="text-center mt-2 border-top pt-4 border-secondary border-opacity-25">
                <span class="text-muted" style="color: #94a3b8 !important;">還沒有帳號嗎？</span> 
                <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none fw-semibold ms-1">註冊一個</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
